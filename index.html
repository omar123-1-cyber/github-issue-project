<!DOCTYPE html>
<html>
<head>
<title>GitHub Issues Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="shortcut icon" href="./B13-A5-Github-Issue-Tracker-main/assets/github-logo.png" type="image/x-icon">

</head>

<body class="flex justify-center items-center h-screen bg-gray-100">

<div class="card w-96 bg-base-100 shadow-xl p-6">

<h1 class="text-2xl font-bold text-center">
GitHub Issues Tracker
</h1>

<p class="text-center text-gray-500 mb-4">
Sign in to continue
</p>

<input id="username"
class="input input-bordered w-full mb-3"
placeholder="Username">

<input id="password"
type="password"
class="input input-bordered w-full mb-3"
placeholder="Password">

<button onclick="login()"
class="btn btn-primary w-full">
Sign In
</button>

<p class="text-sm text-gray-400 text-center mt-3">
Demo: admin / admin123
</p>

</div>

<script>

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(user==="admin" && pass==="admin123"){

alert("Login successful!")
window.location.href="dashboard.html"

}else{

alert("Invalid password. Please try again.")

}

}

</script>

</body>
</html>
